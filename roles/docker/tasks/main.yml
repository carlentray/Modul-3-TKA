- name: Install Docker
  apt:
    name: docker.io
    state: present

- name: Start Docker
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Install UFW
  apt:
    name: ufw
    state: present

- name: Allow SSH
  ufw:
    rule: allow
    port: 22

- name: Enable UFW
  ufw:
    state: enabled